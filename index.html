<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ping Paris — Tables de ping-pong en libre accès</title>
  <meta name="description" content="Trouvez toutes les tables de ping-pong en libre accès à Paris. Carte interactive avec photos et horaires.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --vert:    #1D6A3A;
      --vert-clair: #2E8B57;
      --balle:   #F5C400;
      --blanc:   #F7F5F0;
      --encre:   #1A1A1A;
      --gris:    #6B7280;
      --surface: #FFFFFF;
      --ombre:   0 2px 16px rgba(0,0,0,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--blanc);
      color: var(--encre);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--vert);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--ombre);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--balle);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: var(--balle);
    }

    .header-count {
      font-size: 0.8rem;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid #E5E7EB;
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      background: var(--blanc);
      border: 1.5px solid #D1D5DB;
      border-radius: 20px;
      padding: 5px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: var(--encre);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--vert);
      border-color: var(--vert);
      color: white;
    }

    /* ── MAP ── */
    #map {
      flex: 1;
      min-height: calc(100vh - 60px - 49px);
    }

    /* ── POPUP ── */
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border: none;
      padding: 0;
      overflow: hidden;
      width: 280px;
    }
    .leaflet-popup-content {
      margin: 0;
      width: 100% !important;
    }
    .leaflet-popup-tip { background: white; }

    .popup-photo {
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: #E5E7EB;
      display: block;
    }

    .popup-photo-placeholder {
      width: 100%;
      height: 150px;
      background: linear-gradient(135deg, #1D6A3A 0%, #2E8B57 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
    }

    .popup-photo-placeholder .pp-icon {
      font-size: 36px;
    }

    .popup-photo-placeholder .pp-label {
      font-size: 0.75rem;
      opacity: 0.75;
    }

    .popup-body {
      padding: 14px 16px 16px;
    }

    .popup-arr {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--vert-clair);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 2px;
    }

    .popup-nom {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--encre);
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .popup-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-bottom: 7px;
      font-size: 0.82rem;
      color: var(--gris);
      line-height: 1.4;
    }

    .popup-row .icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }

    .popup-badge {
      display: inline-block;
      background: #DCFCE7;
      color: #166534;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 8px;
    }

    /* ── CUSTOM MARKER ── */
    .custom-marker {
      background: var(--vert);
      width: 36px;
      height: 36px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .custom-marker::after {
      content: '🏓';
      transform: rotate(45deg);
      font-size: 14px;
      display: block;
    }

    /* ── FOOTER ── */
    .map-credit {
      position: absolute;
      bottom: 30px;
      left: 12px;
      z-index: 900;
      background: white;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: var(--gris);
      box-shadow: var(--ombre);
      pointer-events: none;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--vert);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 16px;
      transition: opacity 0.4s;
    }

    .loading-ball {
      width: 48px;
      height: 48px;
      background: var(--balle);
      border-radius: 50%;
      animation: bounce 0.7s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-20px); }
    }

    #loading p {
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      opacity: 0.8;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header-count { display: none; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loading-ball"></div>
  <p>Chargement des tables…</p>
</div>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">🏓</div>
    <div class="logo-text">Ping<span>Paris</span></div>
  </a>
  <div class="header-count" id="header-count">— tables</div>
</header>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-filter="all">Toutes</button>
</div>

<div id="map"></div>

<div class="map-credit">
  Carte © <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> · Données contributives
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ── Init carte
  const map = L.map('map', {
    center: [48.8566, 2.3522],
    zoom: 13,
    zoomControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    maxZoom: 19
  }).addTo(map);

  // ── Icône personnalisée
  function makeIcon() {
    return L.divIcon({
      className: '',
      html: `<div class="custom-marker"></div>`,
      iconSize: [36, 36],
      iconAnchor: [18, 36],
      popupAnchor: [0, -38]
    });
  }

  // ── Génère le HTML du popup
  function popupHtml(t) {
    const photoEl = t.photo
      ? `<img class="popup-photo" src="${t.photo}" alt="Photo de ${t.nom}" loading="lazy">`
      : `<div class="popup-photo-placeholder">
           <div class="pp-icon">🏓</div>
           <div class="pp-label">Photo à venir</div>
         </div>`;

    return `
      ${photoEl}
      <div class="popup-body">
        <div class="popup-arr">${t.arrondissement} arr.</div>
        <div class="popup-nom">${t.nom}</div>
        ${t.horaires ? `
        <div class="popup-row">
          <span class="icon">🕐</span>
          <span>${t.horaires}</span>
        </div>` : ''}
        ${t.notes ? `
        <div class="popup-row">
          <span class="icon">📍</span>
          <span>${t.notes}</span>
        </div>` : ''}
        ${t.acces_libre ? `<div class="popup-badge">✓ Accès libre</div>` : ''}
      </div>
    `;
  }

  // ── Charge les tables
  let allTables = [];
  let markers = [];
  let arrondissements = new Set();

  fetch('tables.json')
    .then(r => r.json())
    .then(tables => {
      allTables = tables;
      document.getElementById('header-count').textContent = `${tables.length} table${tables.length > 1 ? 's' : ''}`;

      // Filtres par arrondissement
      tables.forEach(t => arrondissements.add(t.arrondissement));
      const filterBar = document.getElementById('filter-bar');
      [...arrondissements].sort().forEach(arr => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = arr;
        btn.textContent = arr;
        filterBar.appendChild(btn);
      });

      // Place les marqueurs
      tables.forEach(t => {
        const marker = L.marker([t.lat, t.lng], { icon: makeIcon() })
          .bindPopup(popupHtml(t), { maxWidth: 280 });
        marker._tableData = t;
        marker.addTo(map);
        markers.push(marker);
      });

      // Masque le loader
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
      }, 500);
    })
    .catch(err => {
      console.error('Erreur chargement tables.json', err);
      document.getElementById('loading').classList.add('hidden');
    });

  // ── Filtres
  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;

    markers.forEach(m => {
      const t = m._tableData;
      if (filter === 'all' || t.arrondissement === filter) {
        if (!map.hasLayer(m)) m.addTo(map);
      } else {
        if (map.hasLayer(m)) map.removeLayer(m);
      }
    });
  });
</script>
</body>
</html>
